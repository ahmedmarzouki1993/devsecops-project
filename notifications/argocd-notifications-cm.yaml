apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ── Notification service ─────────────────────────────────────────────────────
  # Named webhook instance — the name "slack-deploy" must match the template
  # block names and the annotation keys below.
  service.webhook.slack-deploy: |
    url: $slack-webhook
    headers:
      - name: Content-Type
        value: application/json

  # ── Notification templates ───────────────────────────────────────────────────
  template.app-synced: |
    webhook:
      slack-deploy:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#18be52",
              "title": "\u2705 {{.app.metadata.name}} synced",
              "text": "Environment: *dev*\nRevision: `{{.app.status.sync.revision | trunc 7}}`\nStatus: *{{.app.status.health.status}}*",
              "footer": "ArgoCD \u2022 #deployments"
            }]
          }

  template.app-sync-failed: |
    webhook:
      slack-deploy:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#E96D76",
              "title": "\u274c {{.app.metadata.name}} sync FAILED",
              "text": "Environment: *dev*\nRevision: `{{.app.status.sync.revision | trunc 7}}`\nPhase: {{.app.status.operationState.phase}}",
              "footer": "ArgoCD \u2022 #deployments"
            }]
          }

  template.app-degraded: |
    webhook:
      slack-deploy:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#E96D76",
              "title": "\u26a0\ufe0f {{.app.metadata.name}} is Degraded",
              "text": "Environment: *dev*\nHealth: *{{.app.status.health.status}}*",
              "footer": "ArgoCD \u2022 #deployments"
            }]
          }

  # ── Triggers ─────────────────────────────────────────────────────────────────
  trigger.on-synced: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.sync.revision
      send: [app-synced]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-degraded]

  defaultTriggers: |
    - on-synced
    - on-sync-failed
    - on-degraded
