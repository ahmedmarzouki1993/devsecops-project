apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ── Notification services ────────────────────────────────────────────────────
  # Slack service uses the webhook URL stored in the notifications secret.
  # The secret key is referenced as $slack-webhook (see argocd-notifications-secret).
  service.slack: |
    token: $slack-webhook
    apiURL: https://hooks.slack.com/services

  # ── Notification templates ───────────────────────────────────────────────────
  template.app-synced: |
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "title": "✅ {{ .app.metadata.name }} synced",
          "text": "Environment: *dev*\nRevision: `{{ .app.status.sync.revision | trunc 7 }}`\nStatus: *{{ .app.status.health.status }}*",
          "footer": "ArgoCD • #deployments",
          "ts": {{ now | unixEpoch }}
        }]

  template.app-sync-failed: |
    slack:
      attachments: |
        [{
          "color": "#E96D76",
          "title": "❌ {{ .app.metadata.name }} sync FAILED",
          "text": "Environment: *dev*\nRevision: `{{ .app.status.sync.revision | trunc 7 }}`\nMessage: {{ .app.status.conditions | map (attr \"message\") | join \", \" }}",
          "footer": "ArgoCD • #deployments",
          "ts": {{ now | unixEpoch }}
        }]

  template.app-degraded: |
    slack:
      attachments: |
        [{
          "color": "#E96D76",
          "title": "⚠️ {{ .app.metadata.name }} is Degraded",
          "text": "Environment: *dev*\nHealth: *{{ .app.status.health.status }}*\nCheck the ArgoCD UI for details.",
          "footer": "ArgoCD • #deployments",
          "ts": {{ now | unixEpoch }}
        }]

  # ── Triggers (when to fire) ───────────────────────────────────────────────────
  trigger.on-synced: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-synced]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-degraded]

  # Default subscriptions — every app with the annotation gets these triggers
  defaultTriggers: |
    - on-synced
    - on-sync-failed
    - on-degraded
