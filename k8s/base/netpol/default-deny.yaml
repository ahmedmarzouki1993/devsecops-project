apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: devsecops-project
  labels:
    app.kubernetes.io/part-of: devsecops-project
spec:
  # Select ALL pods in the namespace
  podSelector: {}
  # Deny all ingress AND egress by default.
  # Every allowed path must be explicitly whitelisted below.
  # "Deny by default, allow by exception" = least-privilege networking.
  policyTypes:
    - Ingress
    - Egress
