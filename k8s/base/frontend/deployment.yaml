apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: devsecops-project
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: devsecops-project
        version: latest
    spec:
      # Non-root: nginx:1.27-alpine uses UID 101 (nginx user).
      # We set runAsNonRoot but do NOT override runAsUser so the
      # Dockerfile's USER nginx (101) is respected — avoids /var/cache/nginx
      # permission errors when forcing an arbitrary UID.
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: acrdevsecops9nsi.azurecr.io/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # Resource limits prevent one pod from starving others on the single node
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # Nginx serves static files — simple TCP probe is sufficient
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
