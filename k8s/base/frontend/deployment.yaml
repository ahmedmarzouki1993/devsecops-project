apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: devsecops-project
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: devsecops-project
        version: latest
    spec:
      # Non-root: nginx:1.27-alpine defines the nginx user as UID 101.
      # runAsUser must be numeric — K8s cannot resolve named users from the image
      # manifest, so "USER nginx" alone fails the runAsNonRoot check.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        # PSS restricted: runtime default seccomp profile
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: acrdevsecops9nsi.azurecr.io/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # Resource limits prevent one pod from starving others on the single node
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # Nginx serves static files — simple TCP probe is sufficient
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            # PSS restricted: drop all capabilities — nginx serves static
            # files and needs no special kernel privileges
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Mount our fixed nginx.conf over the stock one that writes to /run/nginx.pid
            - name: nginx-main-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-main-config
          configMap:
            name: nginx-main-config
