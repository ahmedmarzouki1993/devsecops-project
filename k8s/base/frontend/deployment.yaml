apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: devsecops-project
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: devsecops-project
        version: latest
    spec:
      # Non-root: prevents container escape → host root escalation
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: frontend
          image: acrdevsecops9nsi.azurecr.io/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Resource limits prevent one pod from starving others on the single node
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # Nginx serves static files — simple TCP probe is sufficient
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
