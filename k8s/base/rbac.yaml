---
# Role: minimal read access for the devsecops-app ServiceAccount.
# The backend pod uses this SA to authenticate with workload identity.
# Principle of least privilege: only the permissions actually needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devsecops-app
  namespace: devsecops-project
  labels:
    app.kubernetes.io/part-of: devsecops-project
rules:
  # Needed to read db-credentials Secret (created by CSI driver SecretProviderClass)
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["db-credentials"]
    verbs: ["get"]
  # Health check: allow the app to read its own pod status if needed
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# RoleBinding: bind the Role to our ServiceAccount in this namespace only.
# This is namespaced (not cluster-wide) — no blast radius outside devsecops-project.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devsecops-app
  namespace: devsecops-project
  labels:
    app.kubernetes.io/part-of: devsecops-project
subjects:
  - kind: ServiceAccount
    name: devsecops-app
    namespace: devsecops-project
roleRef:
  kind: Role
  name: devsecops-app
  apiGroup: rbac.authorization.k8s.io
