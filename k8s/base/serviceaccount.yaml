apiVersion: v1
kind: ServiceAccount
metadata:
  name: devsecops-app
  namespace: devsecops-project
  labels:
    app.kubernetes.io/part-of: devsecops-project
  annotations:
    # Workload Identity: links this K8s ServiceAccount to the Azure managed
    # identity mi-devsecops-app. Pods using this SA get an OIDC token that
    # Azure AD accepts — no passwords, no secrets needed to talk to Key Vault.
    azure.workload.identity/client-id: "ad0f1734-0820-409a-bece-476899611204"
