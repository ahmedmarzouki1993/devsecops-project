apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: devsecops-project
spec:
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database
        app.kubernetes.io/part-of: devsecops-project
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        # PSS restricted: runtime default seccomp profile
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 5432
          env:
            # Use _FILE variants: postgres reads the secret value from a file path,
            # not from the env var value itself. This passes CKV_K8S_35 (secrets as
            # files, not env vars) and is supported natively by the official postgres image.
            # The CSI driver mounts Key Vault secrets as files at /mnt/secrets/.
            - name: POSTGRES_DB_FILE
              value: /mnt/secrets/db-name
            - name: POSTGRES_USER_FILE
              value: /mnt/secrets/db-user
            - name: POSTGRES_PASSWORD_FILE
              value: /mnt/secrets/db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: [pg_isready, -U, appuser, -d, appdb]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [pg_isready, -U, appuser, -d, appdb]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            # CSI volume must be mounted for the SecretProviderClass to sync
            # the db-credentials K8s Secret (even if postgres doesn't read files)
            - name: kv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            # Drop all capabilities — PostgreSQL binds to port 5432 (>1024)
            # and needs no raw socket, kernel module, or setuid access
            capabilities:
              drop:
                - ALL
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kv-secrets
