apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: devsecops-project
spec:
  # StatefulSet (not Deployment): preserves stable network identity and volume binding
  # across pod restarts — critical for databases
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database
        app.kubernetes.io/part-of: devsecops-project
    spec:
      securityContext:
        runAsUser: 999   # postgres official image uses UID 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            # WARNING: Phase 6 will replace these with Key Vault secrets via CSI driver.
            # Hardcoded here temporarily for Phase 4 bring-up only.
            - name: POSTGRES_DB
              value: "appdb"
            - name: POSTGRES_USER
              value: "appuser"
            - name: POSTGRES_PASSWORD
              value: "apppassword"
            # Tell postgres where to store data — this matches the volumeMount below
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - appuser
                - -d
                - appdb
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - appuser
                - -d
                - appdb
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
