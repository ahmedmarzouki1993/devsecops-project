apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: devsecops-project
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: devsecops-project
        version: latest
    spec:
      serviceAccountName: devsecops-app
      # Non-root: prevents container escape → host root escalation
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        # PSS restricted: enable the runtime's default seccomp profile.
        # RuntimeDefault allows the syscalls most applications legitimately use.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: acrdevsecops9nsi.azurecr.io/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://appuser:apppassword@database:5432/appdb"
            # Prevent Python from writing .pyc bytecode files to the read-only image layers.
            # pyc files are a compilation cache — unnecessary in containers since the image
            # is rebuilt on every release anyway.
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          # Resource limits prevent one pod from starving others on the single node
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # Liveness: K8s restarts the pod if this fails (app is hung)
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          # Readiness: K8s removes pod from Service endpoints if this fails (not ready for traffic)
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: true — FastAPI/uvicorn cannot write to image layers.
            # Python temp files go to /tmp (emptyDir below).
            readOnlyRootFilesystem: true
            # PSS restricted: drop ALL Linux capabilities.
            # FastAPI/uvicorn needs no special capabilities — no raw sockets,
            # no kernel module loading, no setuid binaries.
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Python uses /tmp for tempfile operations; uvicorn may also write there
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
