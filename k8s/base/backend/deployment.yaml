apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devsecops-project
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: devsecops-project
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: devsecops-project
        version: latest
    spec:
      serviceAccountName: devsecops-app
      # Non-root: prevents container escape → host root escalation
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: acrdevsecops9nsi.azurecr.io/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://appuser:apppassword@database:5432/appdb"
          # Resource limits prevent one pod from starving others on the single node
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # Liveness: K8s restarts the pod if this fails (app is hung)
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          # Readiness: K8s removes pod from Service endpoints if this fails (not ready for traffic)
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
