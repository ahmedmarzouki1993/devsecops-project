apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kv-secrets
  namespace: devsecops-project
  labels:
    app.kubernetes.io/part-of: devsecops-project
spec:
  # Azure Key Vault CSI provider — mounts secrets as files inside pods.
  # Workload Identity (federated credential) authenticates without any password.
  provider: azure
  parameters:
    usePodIdentity: "false"
    # Use the AKS node pool's kubelet managed identity (already on the node).
    # Simpler than workload identity — no token injection needed.
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "e699f2d9-033b-4458-9cd2-93d2d22d2244"  # kubelet identity clientId
    keyvaultName: "kv-devsecops-9nsi"
    cloudName: ""                                        # AzurePublicCloud
    tenantId: "604f1a96-cbe8-43f8-abbf-f8eaf5d85730"
    objects: |
      array:
        - |
          objectName: db-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-user
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-name
          objectType: secret
          objectVersion: ""
  # Sync secrets from Key Vault into K8s Secret objects so they can be
  # referenced as env vars (requires syncSecret.enabled=true on the CSI driver)
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: db-password
          key: password
        - objectName: db-user
          key: username
        - objectName: db-name
          key: dbname
