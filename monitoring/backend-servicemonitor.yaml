apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend
  namespace: monitoring
  labels:
    # This label must match the Prometheus operator's serviceMonitorSelector
    release: kube-prometheus-stack
spec:
  # Watch services in the devsecops-project namespace
  namespaceSelector:
    matchNames:
      - devsecops-project
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  endpoints:
    - port: http         # Named port on the backend Service
      path: /metrics
      interval: 15s
