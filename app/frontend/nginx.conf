# Nginx config for the React frontend container.
#
# NGINX Ingress (Phase 4) sits in front and routes:
#   /api/*   → backend ClusterIP service
#   /*       → this frontend service
#
# This config handles two things:
#   1. Serve the React SPA — any unknown path returns index.html
#      so React Router handles client-side navigation (/items, /users/1, etc.)
#   2. Forward /api/* to the backend service by hostname (works inside the cluster)

server {
    listen 8080;  # Non-privileged port — matches non-root user requirement
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router support — serve index.html for any unknown path
    # Without this, a direct load of /items/3 returns 404 from Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend service.
    # In K8s the hostname is the ClusterIP service name.
    # The NGINX Ingress controller also does this at the cluster edge,
    # but keeping it here lets you run the frontend container standalone.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health probes — forward directly to backend
    location ~ ^/(healthz|readyz)$ {
        proxy_pass http://backend:8000;
    }

    # Static asset caching — hashed filenames from React build are safe to cache forever
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
